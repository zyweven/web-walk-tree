<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Walk Tree</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 16px; min-width: 280px; background: #fafafa; }
    h3 { margin: 0 0 12px 0; font-size: 16px; color: #333; display: flex; align-items: center; gap: 8px; }
    button { padding: 8px 16px; margin-right: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    button:hover { background: #f5f5f5; border-color: #999; }
    button.primary { background: #0070f3; color: white; border-color: #0070f3; }
    button.primary:hover { background: #0051cc; }
    button.danger { background: #dc3545; color: white; border-color: #dc3545; }
    button.danger:hover { background: #bb2d3b; }
    #status { margin-top: 12px; padding: 12px; background: white; border-radius: 4px; font-size: 12px; color: #666; border: 1px solid #e0e0e0; }
  </style>
</head>
<body>
  <h3>🌲 Web Walk Tree</h3>
  <div>
    <button id="openSidePanel" class="primary">📊 查看浏览路径</button>
    <button id="openVisualizer">🗔 在新标签页打开</button>
    <button id="clearData" class="danger">🗑️ 清空所有数据</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>

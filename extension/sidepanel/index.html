<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Walk Tree</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d8dee8;
      --text: #1f2937;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-weak: #dff6f3;
      --danger: #c2410c;
      --current: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-weak);
      color: var(--accent);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .controls-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    select,
    input,
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 12px;
      padding: 6px 8px;
    }

    select,
    input {
      width: 100%;
      min-width: 0;
    }

    button {
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    button.warn {
      border-color: var(--danger);
      color: var(--danger);
      background: #fff8f5;
    }

    #breadcrumb {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      white-space: nowrap;
      overflow-x: auto;
    }

    #canvas {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 1px 1px, #d6deec 1px, transparent 0) 0 0 / 20px 20px,
        linear-gradient(180deg, #fbfcfe, #f1f4fa);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none;
    }

    .edge {
      fill: none;
      stroke-width: 1.6;
      opacity: 0.75;
    }

    .node {
      cursor: pointer;
    }

    .node circle.base {
      stroke: #ffffff;
      stroke-width: 2;
      fill: #3b82f6;
    }

    .node.root circle.base {
      fill: #0f766e;
    }

    .node.current circle.base {
      fill: var(--current);
    }

    .node text {
      font-size: 11px;
      fill: #0f172a;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 3;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .node .halo {
      fill: none;
      stroke: #fca5a5;
      stroke-width: 2;
      stroke-dasharray: 4 3;
      opacity: 0;
      animation: pulse 1.6s linear infinite;
    }

    .node.current .halo {
      opacity: 1;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    #empty {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 16px;
    }

    #statusLine {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 10px;
      border-top: 1px solid var(--line);
      background: var(--panel);
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <div class="title">Web Walk Tree</div>
      <div id="pausedTag" class="tag">记录中</div>
    </div>

    <div class="controls">
      <select id="sessionSelect"></select>
      <select id="rootSelect"></select>
    </div>

    <div class="controls-row">
      <input id="searchInput" type="text" placeholder="按标题或 URL 过滤" />
      <button id="btnRefresh">刷新</button>
      <button id="btnPause" class="warn">暂停</button>
      <button id="btnNewSession">新会话</button>
      <button id="btnExport" class="primary">导出 JSON</button>
    </div>
  </header>

  <div id="breadcrumb"></div>

  <section id="canvas">
    <svg id="graphSvg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
      <g id="viewport">
        <g id="edgeLayer"></g>
        <g id="nodeLayer"></g>
      </g>
    </svg>
    <div id="empty">暂无可视化数据。先打开网页开始浏览，再回来查看路径。</div>
  </section>

  <div id="statusLine">
    <span id="statsText"></span>
    <span id="hintText">滚轮缩放，拖动画布，拖拽节点调整布局</span>
  </div>

  <script src="index.js"></script>
</body>
</html>

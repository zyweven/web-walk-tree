<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Walk Tree</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      padding: 12px 16px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .header-title {
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-main);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      color: var(--text-sub);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: #f1f5f9;
      color: var(--text-main);
    }

    .icon-btn.active {
      background: #eff6ff;
      color: var(--primary);
      border-color: #bfdbfe;
    }

    /* Settings Panel (Collapsed by default) */
    #settingsPanel {
      display: none;
      padding: 16px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      animation: slideDown 0.2s ease-out;
      z-index: 9;
    }
    
    #settingsPanel.open {
      display: block;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 4px;
    }

    .form-control {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      box-sizing: border-box;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-main);
      cursor: pointer;
    }

    /* Breadcrumb */
    #breadcrumb {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-sub);
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none; /* Firefox */
    }
    #breadcrumb::-webkit-scrollbar { display: none; }

    /* Canvas Area */
    #roots {
      flex: 1;
      position: relative;
      overflow: hidden;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 20px 20px;
      background-color: #f8fafc;
    }

    /* Floating Controls */
    .floating-controls {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--card-bg);
      padding: 6px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 100;
    }

    .zoom-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-sub);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.2s;
    }

    .zoom-btn:hover {
      background: #f1f5f9;
      color: var(--text-main);
    }

    /* Tooltip */
    .node-tooltip { 
      position: fixed; 
      background: rgba(15, 23, 42, 0.95); 
      backdrop-filter: blur(4px);
      color: white; 
      padding: 12px; 
      border-radius: 8px; 
      font-size: 12px; 
      max-width: 280px; 
      word-wrap: break-word; 
      z-index: 9999; 
      pointer-events: none;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .node-tooltip.show { opacity: 1; }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-sub);
      text-align: center;
      padding: 20px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

    /* SVG Styles */
    text { user-select: none; }
    .node-group { cursor: pointer; transition: filter 0.2s; }
    .node-group:hover { filter: brightness(0.95); }
    
    /* Debug Panel */
    #debugPanel {
      padding: 8px;
      background: #1e1e1e;
      color: #00ff00;
      font-family: monospace;
      font-size: 10px;
      max-height: 150px;
      overflow-y: auto;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  
  <!-- Header -->
  <header>
    <div class="header-title">
      <span>🕸️</span> Web Walk
    </div>
    <div class="header-actions">
      <button id="toggleSettings" class="icon-btn" title="设置与筛选">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M6 12h12M10 18h4"/>
        </svg>
      </button>
      <select id="viewSelect" class="form-control" style="width:auto; padding:4px 8px;">
        <option value="mindmap">思维导图</option>
        <option value="radial">径向拓扑</option>
        <option value="timeline">时间轴</option>
        <option value="tree">列表树</option>
      </select>
    </div>
  </header>

  <!-- Settings Panel -->
  <div id="settingsPanel">
    <div class="form-group">
      <label>日期筛选</label>
      <div style="display:flex; gap:8px;">
        <input type="date" id="dateFilter" class="form-control" />
        <button id="clearFilter" class="icon-btn" title="清除" style="border:1px solid var(--border);">✕</button>
      </div>
    </div>
    
    <div class="form-group">
      <label>当前树根</label>
      <select id="rootSelect" class="form-control">
        <option value="">自动选择</option>
      </select>
    </div>

    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" id="groupByDomain" /> 
        按域名聚合节点
      </label>
    </div>
    
    <div class="form-group" style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;">
       <button id="btnCopyDebug" style="width:100%;font-size:11px;color:#666;">复制调试信息</button>
    </div>
  </div>

  <!-- Breadcrumb -->
  <div id="breadcrumb"></div>

  <!-- Main Canvas -->
  <div id="roots">
    <!-- SVG content will be injected here -->
  </div>

  <!-- Debug Panel -->
  <div id="debugPanel" style="display:none;"></div>

  <!-- Floating Toolbar -->
  <div class="floating-controls" id="toolbar">
    <button id="btnFit" class="zoom-btn" title="适配屏幕">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
    </button>
    <button id="btnCenter" class="zoom-btn" title="定位到根节点">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <div style="height:1px; background:var(--border); margin:4px 2px;"></div>
    <button id="btnZoomIn" class="zoom-btn" title="放大">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button id="btnZoomOut" class="zoom-btn" title="缩小">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <script src="index.js"></script>
</body>
</html>
